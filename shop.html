  justify-content:center;
  gap:6px;
  margin-top:6px;

  width:50px;
  height:50px;
  border-radius:6px;
  cursor:pointer;
  opacity:0.7;
}
.thumbnail:hover { opacity:1; }

.shop-item button {
  background:#5C4033;
  color:white;
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  margin-top:6px;

.shop-item button:hover { background:#4e2f22; }

.full-desc {
  max-height: 0;

  border-radius:6px;
  margin-top:6px;
  padding:0 10px;

.full-desc.show {

  padding:10px;

  padding:20px;
  border-radius:10px;
  max-width:600px;
  margin:auto;

  right:20px;

  color:white;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}
#cart-count {
  position:absolute;
  top:-5px;
  right:-5px;
  background:#c0392b;
  color:white;
  border-radius:50%;
  width:18px;
  height:18px;

select {

/* ===== Footer ===== */
footer {

products.forEach(p => { if(!p.stock) p.stock=10; if(!p.category) p.category="pet"; });

let cart = [];
let shippingCost = 0;
let activeCategory = "all";

const productList = document.getElementById("product-list");
const categoryFilter = document.getElementById("category-filter");
categoryFilter.addEventListener("change", () => { activeCategory = categoryFilter.value; renderProducts(); });

// ===== Render Products =====
function renderProducts(){
  productList.innerHTML="";
  products.filter(p => activeCategory==="all"||p.category===activeCategory).forEach(p=>{
    const d = document.createElement("div");
    d.className="shop-item";

    const buttonHtml = p.stock===0
      ? `<button disabled>Sold Out</button>`
      : `<button onclick="addToCart('${p.id}','${p.title}',${p.price})">Add to Cart</button>`;

    d.innerHTML=`
      <h3>${p.title}</h3>
      <img src="${p.images[0]}" class="main-image">
      <div class="thumbnail-container">${p.images.map(i=>`<img src="${i}" class="thumbnail" onclick="this.parentNode.previousElementSibling.src='${i}'">`).join('')}</div>
      <p><strong>£${p.price.toFixed(2)}</strong></p>
      <div class="full-desc" id="desc-${p.id}">${p.description}</div>
      <button onclick="toggleDescription('${p.id}', this)">Read More</button>
      <p><em>Stock: ${p.stock}</em></p>
      ${buttonHtml}
    `;
    productList.appendChild(d);
  });
}

// ===== Toggle Description =====
function toggleDescription(id, btn){
  const desc=document.getElementById("desc-"+id);
  desc.classList.toggle("show");
  btn.textContent = desc.classList.contains("show") ? "Read Less" : "Read More";
}

// ===== Cart Functions =====
function addToCart(id, title, price){
  const product=products.find(p=>p.id===id);
  if(!product||product.stock===0) return;
  const item=cart.find(i=>i.id===id);
  if(item){ item.qty++; product.stock--; }
  else { cart.push({id,title,price,qty:1}); product.stock--; }
  renderProducts(); renderCart();
}
function removeFromCart(id){
  const index=cart.findIndex(i=>i.id===id);
  if(index>-1){ const product=products.find(p=>p.id===id); if(product) product.stock+=cart[index].qty; cart.splice(index,1); }
  renderProducts(); renderCart();
}
function changeQty(id,delta){
  const item=cart.find(i=>i.id===id);
  const product=products.find(p=>p.id===id);
  if(!item||!product) return;
  if(delta>0 && product.stock>0){ item.qty++; product.stock--; }
  else if(delta<0 && item.qty>0){ item.qty--; product.stock++; }
  if(item.qty===0) removeFromCart(id);
  renderProducts(); renderCart();
}
function renderCart(){
  const c=document.getElementById("cart");
  c.innerHTML="";
  if(cart.length===0){ c.textContent="Your cart is empty."; updateTotals(); return; }
  cart.forEach(i=>{
    const p=document.createElement("p");
    p.innerHTML=`${i.title} x ${i.qty} – £${(i.price*i.qty).toFixed(2)}
      <button style="margin-left:6px;" onclick="changeQty('${i.id}',1)">+</button>
      <button style="margin-left:3px;" onclick="changeQty('${i.id}',-1)">-</button>
      <button style="margin-left:3px;" onclick="removeFromCart('${i.id}')">Remove</button>`;
    c.appendChild(p);
  });
  updateTotals();
}
document.getElementById("shipping").addEventListener("change", e => { shippingCost=parseFloat(e.target.value); updateTotals(); });
function updateTotals(){
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById("shipping-cost").textContent=`Shipping: £${shippingCost.toFixed(2)}`;
  document.getElementById("order-total").textContent=`Total: £${(total+shippingCost).toFixed(2)}`;
}

// ===== PayPal =====
paypal.Buttons({
  createOrder:(data,actions)=>{
    const total=cart.reduce((s,i)=>s+i.price*i.qty,0)+shippingCost;
    return actions.order.create({purchase_units:[{description:"WildTails & Paws Walkers – Handmade Items",amount:{currency_code:"GBP", value:total.toFixed(2)}}]});
  },
  onApprove:(data,actions)=>{ return actions.order.capture().then(()=>{ alert("Thank you for your order 🐾\nOrders ship within 2–5 working days."); cart=[]; renderProducts(); renderCart(); }); }
}).render("#paypal-button-container");

renderProducts();
</script>
</body>
</html>
